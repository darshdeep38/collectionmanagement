            role="listbox">
            <template for:each={demand.discountOptionsWithState} for:item="opt">
                <li key={opt.value} role="presentation" class="slds-listbox__item">
                    <div class={opt.optionClass}
                        data-id={demand.Id}
                        data-value={opt.value}
                        data-label={opt.label}
                        onclick={selectDiscountOption}
                        role="option">

                            <template if:true={opt.isSelected}>

                        </span>
                        <span class="slds-media__body">
                            <span class="slds-truncate">{opt.label}</span>
                        </span>
                    </div>
                </li>
            </template>
